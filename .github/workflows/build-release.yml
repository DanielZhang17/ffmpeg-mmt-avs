name: Build and release

on:
  push:
    branches: [main]
    tags: ['ffmpeg-*-mmt']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: amd64
            runner: ubuntu-24.04
          - platform: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - platform: macos
            arch: amd64
            runner: macos-15-intel
          - platform: macos
            arch: arm64
            runner: macos-15
          - platform: windows
            arch: amd64
            runner: ubuntu-24.04
          - platform: windows
            arch: arm64
            runner: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            autoconf autoconf-archive automake build-essential bison cmake \
            curl flex gperf libtool meson nasm ninja-build patch perl \
            pkg-config python3 xz-utils yasm zip

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: >-
          brew install autoconf autoconf-archive automake cmake libtool
          meson nasm ninja pkg-config yasm

      - name: Cache portable dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-${{ runner.os }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('vcpkg.json', 'patches/vcpkg/**') }}
          restore-keys: vcpkg-${{ runner.os }}-${{ matrix.platform }}-${{ matrix.arch }}-

      - name: Build release archive
        run: ./scripts/build.sh "${{ matrix.platform }}" "${{ matrix.arch }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-8.1.2-mmt-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/ffmpeg-8.1.2-mmt-${{ matrix.platform }}-${{ matrix.arch }}.*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/ffmpeg-')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "${GITHUB_REF_NAME}" release-assets/* --generate-notes --verify-tag
